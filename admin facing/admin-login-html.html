<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lunar Arc Gym Login</title>
  <link rel="stylesheet" href="../style/admin.css">
</head>
<body>

<div class="container">

  <div class="left">
      <img src="../photo/ChatGPT Image Feb 27, 2026, 02_58_02 PM.png" alt="Lunar Arc Gym Logo" class="logo" height="200px" width="400px" >
      <h1>Welcome to Lunar Arc Gym</h1>
      <p>Train beyond limits.</p>
      <a href="#" class="register">Not a member yet? Register now</a>
  </div>

  <div class="right">
      <div class="form-box">
          <h2>Log in</h2>
          
          <input type="text" placeholder="Email or Username">
          <input type="password" placeholder="Password">

          <label class="remember">
            <input type="checkbox"> Keep me logged in
          </label>

          <button>Log in now</button>

          <a href="#" class="forgot">Forgot your password?</a>

          <div class="social">
              <button class="google">Google</button>
              <button class="facebook">Facebook</button>
              <button class="twitter">Twitter</button>
          </div>
      </div>
  </div>

</div>

</body>
</html>
