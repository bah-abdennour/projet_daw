<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LAG A-Login</title>
  <link rel="stylesheet" href="../style/admin-login.css">
</head>
<body>

<div class="container">

  <div class="left"> 
      <a href="../client facing/index.html" class="back-link">← Return to vistor page</a>
      <img src="../photo/ChatGPT Image Feb 27, 2026, 02_58_02 PM.png" alt="Lunar Arc Gym Logo" class="logo" height="400px" width="500px" >
      <h1>Welcome to Lunar Arc Gym</h1>
      <p>Train beyond limits.</p>
      <a href="#" class="register">Not a member yet? Register now</a>
  </div>

  <div class="right">
      <div class="form-box">
          <h2>Admin Login</h2>
          <p>EMAIL OR USERNAME</p>
          <input type="text" placeholder="Admin" required>
          <p>PASSWORD</p>
          <input type="password" placeholder="••••••••" required>
            
          <label class="remember">
            <input type="checkbox"> Keep me logged in
          </label>
          <p class="error-message"></p>
          <button type="submit"><a class="button-submit" href="./admin dashboard/admin-dashboard.html">LOGIN TO DASHBOARD</a></button>

          <a href="#" class="forgot">Forgot your password?</a>

          <div class="social">
              <button class="google">Google</button>
              <button class="facebook">Facebook</button>
              <button class="twitter">Twitter</button>
          </div>
      </div>
  </div>
</div>
</body>
</html>
